services:
  # Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - nginx
    restart: unless-stopped

  # API Gateway - VERSION FIXE
  nginx:
    image: nginx:1.25-alpine  # ✅ Version fixe
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - listings-service
      - reservations-service
      - credits-service
      - ai-service
    restart: unless-stopped

  # Microservices
  auth-service:
    build: ./services/auth
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/realstate
    depends_on:
      - db
    restart: unless-stopped

  listings-service:
    build: ./services/listings
    ports:
      - "3002:3002"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/realstate
      - AUTH_SERVICE_URL=http://auth-service:3001
      - CREDITS_SERVICE_URL=http://credits-service:3004
      - AI_SERVICE_URL=http://ai-service:3005
    depends_on:
      - db
    restart: unless-stopped

  reservations-service:
    build: ./services/reservations
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/realstate
      - AUTH_SERVICE_URL=http://auth-service:3001
      - LISTINGS_SERVICE_URL=http://listings-service:3002
    depends_on:
      - db
    restart: unless-stopped

  credits-service:
    build: ./services/credits
    ports:
      - "3004:3004"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/realstate
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      - db
    restart: unless-stopped

  # AI Service (OpenRouter)
  ai-service:
    build: ./services/ai
    ports:
      - "3005:3005"
    environment:
      # Base de données
      - DATABASE_URL=postgresql://user:pass@db:5432/realstate
      
      # ✅ OpenRouter (LLM cloud rapide et gratuit)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=deepseek/deepseek-chat
      
      # ✅ ChromaDB (vecteurs locaux)
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - CHROMADB_COLLECTION=trust_estate_knowledge
      
      # ✅ Embeddings locaux
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      
      # Services
      - LISTINGS_SERVICE_URL=http://listings-service:3002
      
    depends_on:
      - db
      - chromadb
      - listings-service
    volumes:
      - ./services/ai:/app
    deploy:
      resources:
        limits:
          memory: 1G  # Réduit de 3G car pas de LLM local
    restart: unless-stopped

  # ChromaDB - Vector Database
  chromadb:
    image: chromadb/chroma:0.4.22  # ✅ Version fixe
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============================================
  # Database principale - VERSION FIXE
  # ============================================
  db:
    image: postgres:15.5-alpine  # ✅ Version fixe
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=realstate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  chromadb_data: