<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trop de requêtes - TrustEstate</title>
    <link rel="icon" type="image/svg+xml" href="/Casa.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-background: #1E1E1E;
            --color-foreground: #EEEEEE;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-background: #0a0a0a;
                --color-foreground: #ededed;
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--color-background);
            color: var(--color-foreground);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 1rem;
            width: 100%;
            height: 100%;
        }

        @media (min-width: 1280px) {
            .wrapper {
                flex-direction: row;
                gap: 2rem;
            }
        }

        .content-left {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 25rem;
        }

        @media (min-width: 1280px) {
            .content-left {
                align-items: flex-end;
                text-align: right;
            }
        }

        .title {
            font-family: 'Inter', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.75;
            line-height: 1.5;
        }

        .divider-container {
            display: none;
            height: 15rem;
            margin: 0 1rem;
        }

        @media (min-width: 1280px) {
            .divider-container {
                display: block;
            }
        }

        .divider {
            height: 100%;
            width: 1px;
            background-color: var(--color-foreground);
            opacity: 0.75;
            -webkit-mask-image: linear-gradient(to top, transparent, white 25%, white 85%, transparent);
            mask-image: linear-gradient(to top, transparent, white 25%, white 85%, transparent);
        }

        .content-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 25rem;
        }

        .icon {
            font-size: 4rem;
            animation: jiggle 1s ease-in-out infinite;
        }

        .btn {
            background-color: var(--color-foreground);
            color: var(--color-background);
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            font-weight: 600;
            border-radius: 0.5rem;
            transition: opacity 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        @keyframes jiggle {
            0% {
                transform: rotate(0deg);
            }

            15% {
                transform: rotate(5deg);
            }

            30% {
                transform: rotate(-5deg);
            }

            45% {
                transform: rotate(3deg);
            }

            60% {
                transform: rotate(-2deg);
            }

            75% {
                transform: rotate(1deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="content-left">
            <div class="title">Trop de requêtes</div>
            <div class="subtitle">
                Vous avez atteint la limite de requêtes autorisée.<br>
                TrustEstate protège ses services pour garantir une expérience fluide à tout le monde. Veuillez patienter
                quelques instants.
            </div>
        </div>

        <div class="divider-container">
            <div class="divider"></div>
        </div>

        <div class="content-right">
            <div class="icon">⏳</div>
            <a href="/" class="btn">
                Retour à l'accueil
            </a>
        </div>
    </div>
</body>

</html>
