<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API REST Tester - Gateway Endpoints</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #3d3d5c;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .gateway-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            border-radius: 6px;
            font-size: 12px;
            color: #93c5fd;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .cookie-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid #34d399;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .cookie-indicator::before {
            content: '';
            display: block;
            width: 8px;
            height: 8px;
            background: #34d399;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #34d399;
            color: #1e1e2e;
        }

        .btn-success:hover {
            background: #10b981;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: #2d2d44;
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            padding: 20px;
        }

        .panel h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #64b5f6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #b0b0d0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="url"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            background: #1e1e2e;
            border: 1px solid #3d3d5c;
            border-radius: 6px;
            color: #e0e0e0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input::placeholder {
            color: #6b7280;
        }

        select {
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-size: 12px;
        }

        .hint {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
            font-style: italic;
        }

        .endpoint-selector {
            margin-bottom: 20px;
        }

        .endpoint-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .endpoint-option {
            padding: 12px;
            background: #1e1e2e;
            border: 2px solid #3d3d5c;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .endpoint-option:hover {
            border-color: #3b82f6;
            background: #252538;
        }

        .endpoint-option.active {
            background: #1e3a5f;
            border-color: #3b82f6;
        }

        .endpoint-method {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-weight: 600;
            font-size: 11px;
            margin-right: 10px;
            min-width: 45px;
            text-align: center;
        }

        .method-get { background: #3b82f6; color: white; }
        .method-post { background: #10b981; color: white; }
        .method-put { background: #f59e0b; color: white; }
        .method-patch { background: #8b5cf6; color: white; }
        .method-delete { background: #ef4444; color: white; }

        .form-fields {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #3d3d5c;
        }

        .form-fields h3 {
            font-size: 13px;
            color: #64b5f6;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .send-button {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .send-button:hover:not(:disabled) {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .send-button:disabled {
            background: #6b7280;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .response-panel {
            grid-column: 1 / -1;
        }

        .response-container {
            background: #1e1e2e;
            border: 1px solid #3d3d5c;
            border-radius: 6px;
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .response-status {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
        }

        .status-2xx {
            background: rgba(16, 185, 129, 0.15);
            color: #6ee7b7;
            border: 1px solid #34d399;
        }

        .status-3xx {
            background: rgba(96, 165, 250, 0.15);
            color: #93c5fd;
            border: 1px solid #3b82f6;
        }

        .status-4xx {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid #f59e0b;
        }

        .status-5xx {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid #ef4444;
        }

        .response-meta {
            display: flex;
            gap: 20px;
            font-size: 12px;
            margin-bottom: 15px;
            color: #a0a0b8;
        }

        .response-meta span {
            display: flex;
            gap: 6px;
        }

        .response-meta strong {
            color: #64b5f6;
        }

        .no-response {
            color: #6b7280;
            text-align: center;
            padding: 40px 20px;
        }

        .error-message {
            color: #fca5a5;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .success-message {
            color: #6ee7b7;
            padding: 12px;
            background: rgba(16, 185, 129, 0.1);
            border-left: 3px solid #34d399;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .response-body {
            white-space: pre-wrap;
            word-break: break-all;
            color: #a0a0b8;
        }

        .json-key {
            color: #64b5f6;
        }

        .json-string {
            color: #6ee7b7;
        }

        .json-number {
            color: #fcd34d;
        }

        .json-boolean {
            color: #8b5cf6;
        }

        .json-null {
            color: #9ca3af;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .method-selector {
                grid-template-columns: repeat(3, 1fr);
            }

            .header-controls {
                flex-direction: column;
                width: 100%;
            }

            header {
                flex-direction: column;
                gap: 15px;
            }
        }

        /* Scrollbar styling */
        .response-container::-webkit-scrollbar {
            width: 8px;
        }

        .response-container::-webkit-scrollbar-track {
            background: #1e1e2e;
            border-radius: 4px;
        }

        .response-container::-webkit-scrollbar-thumb {
            background: #3d3d5c;
            border-radius: 4px;
        }

        .response-container::-webkit-scrollbar-thumb:hover {
            background: #4d4d6c;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div>
                <h1>🧪 API Gateway Tester</h1>
                <div class="gateway-info">
                    🔀 All requests are routed through the Gateway
                </div>
            </div>
            <div class="header-controls">
                <div class="cookie-indicator">
                    Cookies Enabled
                </div>
                <button id="clearBtn" class="btn-danger">Clear Cookies</button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Request Panel -->
            <div class="panel">
                <h2>📨 Request</h2>

                <!-- Endpoint Selector -->
                <div class="endpoint-selector">
                    <label>Select Endpoint</label>
                    <div class="endpoint-options" id="endpointOptions"></div>
                </div>

                <!-- Dynamic Form Fields -->
                <div class="form-fields" id="formFields"></div>

                <!-- Send Button -->
                <button id="googleBtn" class="send-button">Connexion Google</button>
                <button id="sendBtn" class="send-button">Send Request</button>
            </div>

            <!-- Response Panel -->
            <div class="panel response-panel">
                <h2>📩 Response</h2>
                <div class="response-container">
                    <div class="no-response">
                        Select an endpoint and send a request to see the response here...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // Gateway API Tester
        // ============================================

        // Endpoint configurations with validation schemas
		const google = document.getElementById("googleBtn");
		google.addEventListener('click',async () => {
			try {
				window.location.href = "http://localhost:3000/auth/google";
			} catch (error) {
				
			}
		})
        const ENDPOINTS = {
            // Auth endpoints (via Gateway)
            'auth-login': {
                label: 'Login',
                method: 'POST',
                path: '/auth/login',
                gatewayPath: 'http://localhost:3000/auth/login',
                fields: [
                    { name: 'email', label: 'Email', type: 'email', required: true, placeholder: 'user@example.com' },
                    { name: 'password', label: 'Password', type: 'password', required: true, placeholder: 'Enter password' }
                ]
            },
            'auth-register': {
                label: 'Register',
                method: 'POST',
                path: '/auth/register',
                gatewayPath: 'http://localhost:3000/auth/register',
                fields: [
                    { name: 'email', label: 'Email', type: 'email', required: true, placeholder: 'user@example.com', hint: 'Valid email address' },
                    { name: 'firstName', label: 'First Name', type: 'text', required: true, placeholder: 'John', hint: 'Min 3 chars, alphanumeric with optional underscore' },
                    { name: 'lastName', label: 'Last Name', type: 'text', required: true, placeholder: 'Doe', hint: 'Min 3 chars, alphanumeric with optional underscore' },
                    { name: 'phone', label: 'Phone', type: 'tel', required: true, placeholder: '+261321234567', hint: 'Format: +261 32/33/34/38 + 7 digits' },
                    { name: 'password', label: 'Password', type: 'password', required: true, placeholder: 'SecurePass123!', hint: 'Min 12 chars, uppercase, lowercase, number, special char' },
                    { name: 'avatarUrl', label: 'Avatar URL', type: 'url', required: false, placeholder: 'https://example.com/avatar.jpg', hint: 'Optional profile picture URL' }
                ]
            },
            'auth-verify': {
                label: 'Verify Email',
                method: 'POST',
                path: '/auth/verify-email',
                gatewayPath: 'http://localhost:3000/auth/verify-email',
                fields: [
                    { name: 'token', label: 'Verification Token', type: 'text', required: true, placeholder: 'abc123def456...' }
                ]
            },
            'auth-resend': {
                label: 'Resend Email Verification',
                method: 'POST',
                path: '/auth/resend-email',
                gatewayPath: 'http://localhost:3000/auth/resend-email',
                fields: [
                    { name: 'email', label: 'Email', type: 'email', required: true, placeholder: 'user@example.com' },
                    { name: 'lastName', label: 'Last Name', type: 'text', required: true, placeholder: 'Doe', hint: 'Required to verify your identity' }
                ]
            }
        };

        class GatewayAPITester {
            constructor() {
                this.endpointOptions = document.getElementById('endpointOptions');
                this.formFields = document.getElementById('formFields');
                this.sendBtn = document.getElementById('sendBtn');
                this.responseContainer = document.querySelector('.response-container');
                this.clearBtn = document.getElementById('clearBtn');

                this.currentEndpoint = null;
                this.formData = {};

                this.init();
            }

            init() {
                this.renderEndpointOptions();
                this.sendBtn.addEventListener('click', () => this.sendRequest());
                this.clearBtn.addEventListener('click', () => this.clearCookies());

                // Keyboard shortcut
                document.addEventListener('keydown', (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                        this.sendRequest();
                    }
                });

                // Select first endpoint by default
                const firstEndpoint = Object.keys(ENDPOINTS)[0];
                if (firstEndpoint) {
                    this.selectEndpoint(firstEndpoint);
                }
            }

            renderEndpointOptions() {
                this.endpointOptions.innerHTML = '';
                
                Object.entries(ENDPOINTS).forEach(([key, config]) => {
                    const option = document.createElement('div');
                    option.className = 'endpoint-option';
                    option.innerHTML = `
                        <div>
                            <span class="endpoint-method ${this.getMethodClass(config.method)}">${config.method}</span>
                            <strong>${config.label}</strong>
                            <br>
                            <span style="font-size: 11px; color: #9ca3af;">${config.path}</span>
                        </div>
                    `;
                    option.addEventListener('click', () => this.selectEndpoint(key));
                    this.endpointOptions.appendChild(option);
                });
            }

            selectEndpoint(key) {
                this.currentEndpoint = key;
                const config = ENDPOINTS[key];

                // Update active state
                document.querySelectorAll('.endpoint-option').forEach((opt, idx) => {
                    opt.classList.toggle('active', Object.keys(ENDPOINTS)[idx] === key);
                });

                // Render form fields
                this.renderFormFields(config);

                // Save to localStorage
                this.saveToLocalStorage('lastEndpoint', key);
            }

            renderFormFields(config) {
                this.formFields.innerHTML = '';

                if (config.fields.length === 0) {
                    this.formFields.innerHTML = '<p style="color: #9ca3af; font-size: 12px;">No fields required for this endpoint</p>';
                    return;
                }

                const title = document.createElement('h3');
                title.textContent = 'Request Fields';
                this.formFields.appendChild(title);

                config.fields.forEach(field => {
                    const group = document.createElement('div');
                    group.className = 'form-group';

                    const label = document.createElement('label');
                    label.htmlFor = field.name;
                    label.textContent = field.label + (field.required ? ' *' : '');
                    group.appendChild(label);

                    const input = document.createElement('input');
                    input.type = field.type;
                    input.id = field.name;
                    input.name = field.name;
                    input.placeholder = field.placeholder;
                    input.required = field.required;

                    input.addEventListener('change', (e) => {
                        this.formData[field.name] = e.target.value;
                        this.saveToLocalStorage(`field_${field.name}`, e.target.value);
                    });

                    // Load saved value
                    const savedValue = this.getFromLocalStorage(`field_${field.name}`);
                    if (savedValue) {
                        input.value = savedValue;
                        this.formData[field.name] = savedValue;
                    }

                    group.appendChild(input);

                    if (field.hint) {
                        const hint = document.createElement('div');
                        hint.className = 'hint';
                        hint.textContent = '💡 ' + field.hint;
                        group.appendChild(hint);
                    }

                    this.formFields.appendChild(group);
                });
            }

            async sendRequest() {
                if (!this.currentEndpoint) {
                    this.displayError('Please select an endpoint');
                    return;
                }

                const config = ENDPOINTS[this.currentEndpoint];
                const url = config.gatewayPath;

                // Validate required fields
                for (const field of config.fields) {
                    if (field.required && !this.formData[field.name]) {
                        this.displayError(`${field.label} is required`);
                        return;
                    }
                }

                this.sendBtn.disabled = true;
                this.sendBtn.textContent = 'Sending...';

                try {
                    const startTime = performance.now();

                    const options = {
                        method: config.method,
                        credentials: 'include', // Include cookies
                        headers: {
                            'Content-Type': 'application/json',
                        },
                    };

                    // Add body for POST/PUT/PATCH
                    if (['POST', 'PUT', 'PATCH'].includes(config.method)) {
                        const body = {};
                        config.fields.forEach(field => {
                            if (this.formData[field.name]) {
                                body[field.name] = this.formData[field.name];
                            }
                        });
                        options.body = JSON.stringify(body);
                    }

                    const response = await fetch(url, options);
                    const endTime = performance.now();
                    const duration = (endTime - startTime).toFixed(2);

                    const contentType = response.headers.get('content-type');
                    let body;

                    if (contentType && contentType.includes('application/json')) {
                        body = await response.json();
                    } else {
                        body = await response.text();
                    }

                    this.displayResponse(response.status, response.statusText, body, duration, url);

                } catch (error) {
                    this.displayError(`Network Error: ${error.message}`);
                } finally {
                    this.sendBtn.disabled = false;
                    this.sendBtn.textContent = 'Send Request';
                }
            }

            displayResponse(status, statusText, body, duration, url) {
                const statusClass = this.getStatusClass(status);

                let html = `
                    <div class="response-status">
                        <div class="status-badge ${statusClass}">
                            <strong>${status}</strong> ${statusText}
                        </div>
                        <div style="color: #9ca3af; display: flex; gap: 20px; font-size: 12px;">
                            <span><strong>⏱️</strong> ${duration}ms</span>
                            <span><strong>🔗</strong> Cookies: Included</span>
                            <span><strong>🌐</strong> Gateway: Active</span>
                        </div>
                    </div>
                    <div class="response-meta">
                        <span><strong>URL:</strong> ${url}</span>
                    </div>
                `;

                let bodyHtml = '';
                if (typeof body === 'object') {
                    bodyHtml = `<pre class="response-body">${this.syntaxHighlightJSON(body)}</pre>`;
                } else {
                    bodyHtml = `<pre class="response-body">${this.escapeHtml(body)}</pre>`;
                }

                html += bodyHtml;
                this.responseContainer.innerHTML = html;
            }

            displayError(message) {
                const html = `<div class="error-message">⚠️ ${message}</div>`;
                this.responseContainer.innerHTML = html;
            }

            getStatusClass(status) {
                if (status >= 200 && status < 300) return 'status-2xx';
                if (status >= 300 && status < 400) return 'status-3xx';
                if (status >= 400 && status < 500) return 'status-4xx';
                if (status >= 500) return 'status-5xx';
                return '';
            }

            getMethodClass(method) {
                return `method-${method.toLowerCase()}`;
            }

            syntaxHighlightJSON(obj) {
                const json = JSON.stringify(obj, null, 2);
                return json
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
                        let cls = 'json-number';
                        if (/^"/.test(match)) {
                            cls = match.endsWith(':') ? 'json-key' : 'json-string';
                        } else if (/true|false/.test(match)) {
                            cls = 'json-boolean';
                        } else if (/null/.test(match)) {
                            cls = 'json-null';
                        }
                        return `<span class="${cls}">${match}</span>`;
                    });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            clearCookies() {
                // Clear all cookies
                document.cookie.split(';').forEach(c => {
                    const eqPos = c.indexOf('=');
                    const name = eqPos > -1 ? c.substr(0, eqPos).trim() : c.trim();
                    document.cookie = `${name}=;expires=Thu, 01 Jan 1970 00:00:00 UTC;path=/;`;
                });
                alert('Cookies have been cleared!');
            }

            saveToLocalStorage(key, value) {
                try {
                    localStorage.setItem(`gatewayTester_${key}`, value);
                } catch (e) {
                    console.warn('localStorage not available', e);
                }
            }

            getFromLocalStorage(key) {
                try {
                    return localStorage.getItem(`gatewayTester_${key}`);
                } catch (e) {
                    console.warn('localStorage not available', e);
                    return null;
                }
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            new GatewayAPITester();
        });
    </script>
</body>
</html>
