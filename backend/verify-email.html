<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification Email</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <div class="card" style="text-align: center;">
            <h2>Vérification en cours</h2>
            <p id="status-message" class="subtitle">Veuillez patienter pendant que nous validons votre email...</p>

            <div id="loader" style="margin: 2rem 0;">
                <!-- Simple loader CSS (on pourrait l'ajouter dans style.css) -->
                <div
                    style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #1a1a1a; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;">
                </div>
            </div>

            <button id="btn-home" class="btn-primary hidden" onclick="window.location.href = 'index.html'">Retour à la
                connexion</button>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:3001';

        async function verifyEmail() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const statusMsg = document.getElementById('status-message');
            const loader = document.getElementById('loader');
            const btnHome = document.getElementById('btn-home');

            if (!token) {
                statusMsg.textContent = "Lien invalide. Token manquant.";
                statusMsg.style.color = "var(--error-color)";
                loader.classList.add('hidden');
                btnHome.classList.remove('hidden');
                return;
            }

            try {
                // L'endpoint attend { body: { token: "..." } }
                const response = await fetch(`${API_BASE_URL}/auth/verify-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (response.ok) {
                    statusMsg.textContent = "Email vérifié avec succès ! Redirection...";
                    statusMsg.style.color = "green";
                    loader.classList.add('hidden');

                    // Stocker les infos user si renvoyées par le verify (auto-login possible)
                    // Si l'endpoint renvoie l'user, on le save :
                    if (data.id || data.email) {
                        localStorage.setItem('user', JSON.stringify(data));
                    }

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    throw new Error(data.message || "Échec de la vérification.");
                }

            } catch (error) {
                console.error(error);
                statusMsg.textContent = error.message;
                statusMsg.style.color = "var(--error-color)";
                loader.classList.add('hidden');
                btnHome.classList.remove('hidden');
            }
        }

        window.addEventListener('DOMContentLoaded', verifyEmail);
    </script>
</body>

</html>
