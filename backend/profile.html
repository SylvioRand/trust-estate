<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mon Profil</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            color: white;
        }

        .dashboard-header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: white;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .stat-label {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .icon-purple { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .icon-blue { background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%); }
        .icon-green { background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%); }
        .icon-orange { background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%); }

        .profile-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f3f4f6;
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            color: white;
        }

        .profile-name {
            flex: 1;
        }

        .profile-name h2 {
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 5px;
        }

        .profile-role {
            display: inline-block;
            padding: 5px 15px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .info-item {
            padding: 15px;
            background: #f9fafb;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 16px;
            color: #1f2937;
            font-weight: 600;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-warning {
            background: #fed7aa;
            color: #92400e;
        }

        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 15px;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard">
        <!-- Header -->
        <div class="dashboard-header">
            <h1>📊 Dashboard</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="user-badge">
                    <div class="user-avatar" id="header-avatar">TT</div>
                    <span id="header-name">Chargement...</span>
                </div>
                <button onclick="logout()" class="logout-btn">Se déconnecter</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-icon icon-purple">🎯</div>
                <div class="stat-label">Trust Score</div>
                <div class="stat-value" id="trust-score">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon icon-blue">💰</div>
                <div class="stat-label">Crédits</div>
                <div class="stat-value" id="credit-balance">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-icon icon-green">✓</div>
                <div class="stat-label">Email</div>
                <div class="stat-value" style="font-size: 18px;">
                    <span class="badge badge-success" id="email-status">
                        <span>✓</span>
                        <span>Vérifié</span>
                    </span>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon icon-orange">📱</div>
                <div class="stat-label">Téléphone</div>
                <div class="stat-value" style="font-size: 18px;">
                    <span class="badge badge-success" id="phone-status">
                        <span>✓</span>
                        <span>Vérifié</span>
                    </span>
                </div>
            </div>
        </div>

        <!-- Profile Details -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profile-avatar">TT</div>
                <div class="profile-name">
                    <h2 id="full-name">Chargement...</h2>
                    <span class="profile-role" id="user-role">USER</span>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value" id="profile-email">Chargement...</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Téléphone</div>
                    <div class="info-value" id="profile-phone">---</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Prénom</div>
                    <div class="info-value" id="profile-firstname">---</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Nom</div>
                    <div class="info-value" id="profile-lastname">---</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Date de création</div>
                    <div class="info-value" id="profile-created">---</div>
                </div>

                <div class="info-item">
                    <div class="info-label">Dernière mise à jour</div>
                    <div class="info-value" id="profile-updated">---</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:3001';

        // Fonction pour obtenir les initiales
        function getInitials(firstName, lastName) {
            const first = firstName ? firstName[0].toUpperCase() : '';
            const last = lastName ? lastName[0].toUpperCase() : '';
            return first + last || '??';
        }

        // Fonction pour formater les dates
        function formatDate(dateString) {
            if (!dateString) return '---';
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Fonction de déconnexion
        async function logout() {
            try {
                await fetch(`${API_BASE_URL}/auth/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                console.error("Erreur logout:", error);
            } finally {
                window.location.href = 'index.html';
            }
        }

        // Chargement des données via l'API
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/users/me`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    
                    // Redirection si téléphone non vérifié
                    if (response.status === 403 && errorData.error === 'phone_number_not_verified') {
                        // window.location.href = 'add-phone.html';
						console.log("HELLO");
                        return;
                    }
                    
                    // Redirection si email non vérifié
                    if (response.status === 401 && errorData.error === 'email_not_verified') {
                        window.location.href = 'request-email-verification.html';
                        return;
                    }
                    
                    throw new Error('Non authentifié ou session expirée');
                }

                const user = await response.json();
				console.log(user);
                // Initiales pour avatars
                const initials = getInitials(user.firstName, user.lastName);
                document.getElementById('header-avatar').textContent = initials;
                document.getElementById('profile-avatar').textContent = initials;

                // Nom complet
                const fullName = `${user.firstName || ''} ${user.lastName || ''}`.trim() || 'Utilisateur';
                document.getElementById('header-name').textContent = user.firstName || 'Utilisateur';
                document.getElementById('full-name').textContent = fullName;

                // Informations de profil
                document.getElementById('profile-email').textContent = user.email || 'Inconnu';
                document.getElementById('profile-firstname').textContent = user.firstName || '---';
                document.getElementById('profile-lastname').textContent = user.lastName || '---';
                document.getElementById('profile-phone').textContent = user.phone || '---';
                document.getElementById('user-role').textContent = user.role || 'USER';

                // Stats
                document.getElementById('trust-score').textContent = user.trustScore || 0;
                document.getElementById('credit-balance').textContent = user.creditBalance || 0;

                // Statuts de vérification
                const emailStatus = document.getElementById('email-status');
                if (user.emailVerified) {
                    emailStatus.innerHTML = '<span>✓</span><span>Vérifié</span>';
                    emailStatus.className = 'badge badge-success';
                } else {
                    emailStatus.innerHTML = '<span>⚠</span><span>Non vérifié</span>';
                    emailStatus.className = 'badge badge-warning';
                }

                const phoneStatus = document.getElementById('phone-status');
                if (user.phoneVerified) {
                    phoneStatus.innerHTML = '<span>✓</span><span>Vérifié</span>';
                    phoneStatus.className = 'badge badge-success';
                } else {
                    phoneStatus.innerHTML = '<span>⚠</span><span>Non vérifié</span>';
                    phoneStatus.className = 'badge badge-warning';
                }

                // Dates
                document.getElementById('profile-created').textContent = formatDate(user.createdAt);
                document.getElementById('profile-updated').textContent = formatDate(user.updatedAt);

            } catch (error) {
                console.warn('Erreur chargement profil:', error);
                // window.location.href = 'index.html';
            }
        });
    </script>
</body>

</html>
