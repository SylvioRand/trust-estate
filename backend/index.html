<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion / Inscription</title>

    <!-- Lien vers notre fichier CSS pour le style -->
    <link rel="stylesheet" href="style.css">

    <!-- Police d'écriture (Google Fonts) pour un look moderne -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Conteneur principal (centré sur la page) -->
    <div class="container">

        <!-- SECTION AUTHENTIFICATION (Login / Signup) -->
        <div id="auth-section" class="card">

            <!-- Onglets pour basculer entre Login et Signup -->
            <div class="tabs">
                <button id="tab-login" class="tab active" onclick="showLogin()">Login</button>
                <button id="tab-signup" class="tab" onclick="showSignup()">Sign Up</button>
            </div>

            <!-- FORMULAIRE DE CONNEXION (LOGIN) -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <h2>Bon retour !</h2>
                <p class="subtitle">Entrez vos identifiants pour accéder à votre compte.</p>

                <div class="input-group">
                    <label for="login-email">Adresse Email</label>
                    <input type="email" id="login-email" placeholder="votre@email.com" required>
                </div>

                <div class="input-group">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" placeholder="Votre mot de passe" required>
                </div>

                <button type="submit" class="btn-primary">Se connecter</button>

                <div id="login-error" class="error-message"></div>
            </form>

            <!-- FORMULAIRE D'INSCRIPTION (SIGNUP) -->
            <!-- Caché par défaut via CSS -->
            <form id="signup-form" class="auth-form hidden" onsubmit="handleSignup(event)">
                <h2>Créer un compte</h2>
                <p class="subtitle">Rejoignez-nous en quelques secondes.</p>

                <div class="input-group">
                    <label for="signup-firstname">Prénom</label>
                    <input type="text" id="signup-firstname" placeholder="Votre prénom" required minlength="3"
                        pattern="^[A-Za-zÀ-ÖØ-öø-ÿ]+(?:[ '-][A-Za-zÀ-ÖØ-öø-ÿ]+)*$"
                        title="Lettres uniquement, min 3 caractères">
                </div>

                <div class="input-group">
                    <label for="signup-lastname">Nom</label>
                    <input type="text" id="signup-lastname" placeholder="Votre nom" required minlength="3"
                        pattern="^[A-Za-zÀ-ÖØ-öø-ÿ]+(?:[ '-][A-Za-zÀ-ÖØ-öø-ÿ]+)*$"
                        title="Lettres uniquement, min 3 caractères">
                </div>

                <div class="input-group">
                    <label for="signup-email">Adresse Email</label>
                    <input type="email" id="signup-email" placeholder="votre@email.com" required>
                </div>

                <div class="input-group">
                    <label for="signup-phone">Téléphone</label>
                    <input type="tel" id="signup-phone" placeholder="+261 32 XX XXX XX" required
                        pattern="\+261(32|33|34|38)\d{7}" title="Format: +261 seguido de 9 dígitos (ex: +261321234567)">
                </div>

                <div class="input-group">
                    <label for="signup-password">Mot de passe</label>
                    <input type="password" id="signup-password"
                        placeholder="Min 12 caractères, Maj, Min, Chiffre, Spécial" required>
                </div>

                <!-- On pourrait ajouter une confirmation de mot de passe ici si besoin -->

                <button type="submit" class="btn-primary">S'inscrire</button>

                <div id="signup-error" class="error-message"></div>
            </form>

        </div>

        <!-- SECTION PROFIL (Cachée tant qu'on n'est pas connecté) -->
        <div id="profile-section" class="card hidden">
            <h2>Mon Profil</h2>
            <div class="profile-info">
                <p><strong>Email :</strong> <span id="profile-email">---</span></p>
                <p><strong>ID :</strong> <span id="profile-id">---</span></p>
                <!-- Autres infos si disponibles -->
            </div>

            <!-- Pour l'instant, on recharger la page pour se déconnecter (ou vider les cookies) -->
            <button onclick="window.location.reload()" class="btn-secondary">Se déconnecter</button>
        </div>

    </div>

    <!-- Lien vers notre fichier JavaScript pour la logique -->
    <script src="script.js"></script>

</body>

</html>
