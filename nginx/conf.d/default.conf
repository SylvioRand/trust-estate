# Upstream services
upstream auth_service {
    server auth-service:3001;
}

upstream listings_service {
    server listings-service:3002;
}

# upstream ai_service {
#     server ai-service:3005;
# }

upstream credits_service {
    server credits-service:3004;
}

server {
    listen 80;
    server_name localhost;
    
    # HTTP Configuration (Dev/Tools)
    # No SSL directives here
    
    include /etc/nginx/conf.d/common_routes.inc;
}

server {
    listen 443 ssl http2;
    server_name localhost;
    
    # SSL Configuration (HTTPS)
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security Headers (Helmet)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    include /etc/nginx/conf.d/common_routes.inc;
}
