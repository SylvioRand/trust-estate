# Upstream services
upstream auth_service {
    server auth-service:3001;
}

upstream listings_service {
    server listings-service:3002;
}

upstream reservations_service {
    server reservations-service:3003;
}

upstream ai_service {
    server ai-service:3005;
}

upstream credits_service {
    server credits-service:3004;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=chatbot_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=120r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=120r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=read_limit:10m   rate=120r/m;

server {
    listen 443 ssl http2;
    server_name localhost;
    
    # SSL Configuration (HTTPS)
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security Headers (Helmet)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # # Rate Limiting Error Handling
    # error_page 429 @rate_limit_error;

    # API requests → JSON
    # location @rate_limit_error {
    #     default_type application/json;
    #     add_header Content-Type application/json always;
    #     return 429 '{"error": "too_many_requests", "message": "Trop de requêtes. Veuillez ralentir."}';
    # }

    include /etc/nginx/conf.d/common_routes.inc;
}
